services:
  tidal-dl-pro-web:
    image: ${APP_IMAGE:-ghcr.io/rgnet1/tidal-dl-pro:latest}
    container_name: tidal-dl-pro-web
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      # Match the host user so bind-mounted files (./config, ./downloads) end
      # up owned by your account. Override in a .env file if needed.
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # Optional: force default engine on boot (tidal-dl-ng | tiddl). Settings UI can override.
      # ACTIVE_ENGINE: "tidal-dl-ng"
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
