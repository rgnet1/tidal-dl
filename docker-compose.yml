services:
  tidal-dl-pro-web:
    image: rgnet1/tidal-dl:latest
    container_name: tidal-dl-pro-web
    pull_policy: always
    ports:
      - "${TIDAL_DL_PRO_PORT:-8001}:8000"
    environment:
      # Match the host user so bind-mounted files (./config, ./downloads) end
      # up owned by your account. Override in a .env file if needed.
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # Optional: force default engine on boot (tidal-dl-ng | tiddl). Settings UI can override.
      # ACTIVE_ENGINE: "tidal-dl-ng"
    volumes:
      # Persist TIDAL login tokens and app settings on the host.
      # Container path /config is XDG_CONFIG_HOME, so settings.json and
      # token.json are written to ./config/tidal_dl_ng/ on the host and
      # survive image updates.
      - ./config:/config
      - ./downloads:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
