# Local development only — builds the image from the Dockerfile in this repo.
# For normal use, run `docker compose up -d` (pulls rgnet1/tidal-dl:latest from Docker Hub).
services:
  tidal-dl-pro-web:
    build: .
    container_name: tidal-dl-pro-web
    ports:
      - "${TIDAL_DL_PRO_PORT:-8001}:8000"
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # ACTIVE_ENGINE: "tidal-dl-ng"
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
